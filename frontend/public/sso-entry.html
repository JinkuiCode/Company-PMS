<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OA 统一认证 - PMS</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --pms-bg: #f6f8fb;
    --pms-surface: #ffffff;
    --pms-border: #edf1f6;
    --pms-text: #162033;
    --pms-text-secondary: #667085;
    --pms-text-muted: #98a2b3;
    --pms-primary: #4f46e5;
    --pms-primary-hover: #4338ca;
    --pms-primary-soft: rgba(79,70,229,.1);
    --pms-warning: #d97706;
    --pms-danger: #dc2626;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; background: var(--pms-bg); color: var(--pms-text);
  }
  .card {
    width: min(100%, 380px); background: var(--pms-surface); border: 1px solid var(--pms-border);
    border-radius: 8px; padding: 38px 34px; box-shadow: 0 1px 2px rgba(16,24,40,.05); text-align: center;
  }
  .icon {
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; color: var(--pms-primary); background: var(--pms-primary-soft);
    border: 1px solid rgba(79,70,229,.18); border-radius: 8px; font-size: 28px;
  }
  .title { font-size: 20px; font-weight: 700; color: var(--pms-text); margin-bottom: 12px; }
  .hint { color: var(--pms-text-secondary); margin-bottom: 24px; font-size: 14px; line-height: 1.6; }
  .error { color: var(--pms-danger); margin: 12px 0; font-size: 14px; }
  .btn {
    width: 100%; height: 40px; padding: 0 12px; font-size: 15px; font-weight: 600;
    background: var(--pms-primary); color: #fff; border: none; border-radius: 6px;
    cursor: pointer; margin-top: 8px;
  }
  .btn:hover { background: var(--pms-primary-hover); }
  .footer { margin-top: 20px; color: var(--pms-text-muted); font-size: 13px; }
  .footer a { color: var(--pms-primary); text-decoration: none; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid #e8edf5; border-top-color: var(--pms-primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#128274;</div>
  <div class="title" id="title">OA 统一认证登录</div>
  <div id="loadingArea">
    <p class="hint"><span class="spinner"></span>正在验证登录状态...</p>
  </div>
  <div id="redirectArea" style="display:none;">
    <p class="hint">未检测到有效登录状态，可继续通过 OA 统一认证登录。</p>
    <button class="btn" onclick="doRedirect()">手动跳转 OA 登录</button>
  </div>
  <div id="errorArea" style="display:none;">
    <p class="error" id="errorMsg"></p>
    <button class="btn" onclick="doRedirect()">重新尝试 OA 认证</button>
  </div>
  <div class="footer">
    也可使用 <a href="/login">账号密码登录</a>
  </div>
</div>

<script>
(function() {
  var VER = '20260518-v2';  // 版本标识，确认新代码已加载

  // 跳转到 OA CAS 登录
  function doRedirect() {
    window.location.href = '/api/sso/oa-redirect';
  }
  // 暴露到全局
  window.doRedirect = doRedirect;

  // 登录成功后跳转到 PMS
  function goToPms(token) {
    try { localStorage.setItem('access_token', token); } catch(e) {}
    try { localStorage.setItem('pms_token', token); } catch(e) {}
    window.location.href = '/dashboard?ver=' + VER;
  }

  // 显示加载区
  function showLoading() {
    document.getElementById('loadingArea').style.display = '';
    document.getElementById('redirectArea').style.display = 'none';
    document.getElementById('errorArea').style.display = 'none';
  }

  // 显示跳转区
  function showRedirect() {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('redirectArea').style.display = '';
    document.getElementById('errorArea').style.display = 'none';
  }

  // 显示错误
  function showError(msg) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('redirectArea').style.display = 'none';
    document.getElementById('errorArea').style.display = '';
    document.getElementById('errorMsg').textContent = msg;
  }

  // 尝试自动登录
  async function autoLogin() {
    var token = null;
    try { token = localStorage.getItem('access_token'); } catch(e) {}
    if (!token) {
      try { token = localStorage.getItem('pms_token'); } catch(e) {}
    }
    if (!token) return false;

    try {
      var resp = await fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (resp.ok) {
        var data = await resp.json();
        if (data && data.username) {
          goToPms(token);
          return true;
        }
      }
      // token 无效，清除
      try { localStorage.removeItem('access_token'); } catch(e) {}
      try { localStorage.removeItem('pms_token'); } catch(e) {}
    } catch(e) {}
    return false;
  }

  // 主流程
  autoLogin().then(function(ok) {
    if (ok) return;  // 自动登录成功，已跳转

    // 无有效 token → 停留在入口页，用户可手动选择 OA 或账号密码登录
    showRedirect();
    document.getElementById('title').textContent = 'OA 统一认证登录 [' + VER + ']';
  }).catch(function(err) {
    showError('检测登录状态时出错: ' + (err.message || '未知错误'));
  });
})();
</script>
</body>
</html>
